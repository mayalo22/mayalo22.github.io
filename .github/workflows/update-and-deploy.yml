name: Update book prices

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run now even if the last update was less than 3 days ago"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: due
        name: Check whether three days have passed
        shell: bash
        run: |
          LAST=$(node -p "Date.parse(require('./data.json').updatedAt) || 0")
          NOW=$(date +%s000)
          AGE=$((NOW - LAST))
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$AGE" -ge 259200000 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Refresh public data
        if: steps.due.outputs.should_run == 'true'
        run: node scripts/update-content.mjs
      - name: Save refreshed data
        if: steps.due.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: refresh book prices"
          git push
