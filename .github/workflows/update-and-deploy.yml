name: Update prices, Instagram and deploy

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run now even if the last update was less than 3 days ago"
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.due.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
      - id: due
        name: Check whether three days have passed
        shell: bash
        run: |
          LAST=$(node -p "Date.parse(require('./data.json').updatedAt) || 0")
          NOW=$(date +%s000)
          AGE=$((NOW - LAST))
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$AGE" -ge 259200000 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Refresh public data
        if: steps.due.outputs.should_run == 'true'
        run: node scripts/update-content.mjs
      - name: Save refreshed data
        if: steps.due.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: refresh prices and Instagram"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
